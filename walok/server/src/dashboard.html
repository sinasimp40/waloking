<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXAMPLE CAFE Server</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #ff6a00;
      --accent-dim: rgba(255,106,0,0.6);
      --accent-bg: rgba(255,106,0,0.08);
      --accent-border: rgba(255,106,0,0.15);
      --bg: #08080f;
      --card: rgba(255,255,255,0.025);
      --card-border: rgba(255,255,255,0.05);
      --text: #d0d0d8;
      --text-dim: rgba(255,255,255,0.35);
      --green: #10b981;
      --red: #ef4444;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    .titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 40px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid var(--card-border);
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .titlebar-brand {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.12em;
    }

    .titlebar-sep {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.1);
    }

    .titlebar-sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .titlebar-controls {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 2px;
    }

    .titlebar-controls button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      width: 32px;
      height: 28px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
      line-height: 1;
      transition: all 0.2s;
    }

    .titlebar-controls button:hover { background: rgba(255,255,255,0.08); color: white; }
    .titlebar-controls button.close:hover { background: rgba(239,68,68,0.8); color: white; }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--card-border);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: pulse 2s infinite;
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-label.online { color: var(--green); }
    .status-label.offline { color: var(--red); }

    .status-address {
      margin-left: auto;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: var(--green);
      letter-spacing: 0.04em;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.15);
      padding: 4px 12px;
      border-radius: 6px;
    }

    .server-controls {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-border), transparent);
    }

    .stat-card h4 {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 600;
      color: var(--accent-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--card-border);
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--accent-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .config-body {
      padding: 16px 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .config-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .config-field label {
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .config-field input {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 7px 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 160px;
    }

    .config-field input:focus { border-color: var(--accent-border); }

    .config-field input.port { width: 80px; }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .btn-accent {
      background: var(--accent);
      color: #000;
    }

    .btn-accent:hover { box-shadow: 0 0 16px rgba(255,106,0,0.35); }

    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      color: var(--text-dim);
    }

    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .btn-red {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--red);
    }

    .btn-red:hover { background: rgba(239,68,68,0.25); }

    .btn-sm { font-size: 8px; padding: 5px 10px; }

    .config-actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
      align-items: flex-end;
      padding-top: 14px;
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
    }

    .users-table th {
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      font-weight: 600;
      color: var(--accent-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--card-border);
      white-space: nowrap;
    }

    .users-table td {
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      font-size: 13px;
      white-space: nowrap;
    }

    .users-table tr:hover td { background: rgba(255,106,0,0.02); }

    .username-link {
      cursor: pointer;
      color: var(--text);
      transition: color 0.2s;
    }

    .username-link:hover { color: var(--accent); }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      font-family: 'Orbitron', monospace;
      background: rgba(255,106,0,0.1);
      color: var(--accent);
      border: 1px solid var(--accent-border);
    }

    .empty-msg {
      color: var(--text-dim);
      text-align: center;
      padding: 24px;
      font-size: 13px;
    }

    .saves-row td {
      padding: 0 14px 10px 36px !important;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }

    .saves-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .save-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      font-size: 11px;
    }

    .save-item .game-name {
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      min-width: 100px;
    }

    .save-item .save-meta {
      color: var(--text-dim);
      flex: 1;
    }

    .td-actions {
      display: flex;
      gap: 4px;
    }

    .footer {
      flex-shrink: 0;
      padding: 8px 18px;
      border-top: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
    }

    .footer-brand {
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      color: rgba(255,106,0,0.3);
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <span class="titlebar-brand">EXAMPLE CAFE</span>
      <div class="titlebar-sep"></div>
      <span class="titlebar-sub">Server</span>
      <span id="titlebarVersion" style="margin-left:10px; font-size:10px; color:rgba(255,255,255,0.35); letter-spacing:0.05em;"></span>
    </div>
    <div class="titlebar-controls">
      <button onclick="window.serverAPI.minimizeToTray()" title="Minimize to tray">&#x2014;</button>
      <button class="close" onclick="window.serverAPI.minimizeToTray()" title="Hide to tray">&#x2715;</button>
    </div>
  </div>

  <div class="main">
    <div class="status-bar">
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label offline" id="statusLabel">OFFLINE</span>
      </div>
      <div class="status-address" id="statusAddress" style="display:none;"></div>
      <div class="server-controls">
        <button class="btn btn-accent" id="startBtn">Start</button>
        <button class="btn btn-red" id="stopBtn">Stop</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h4>Users</h4>
        <div class="stat-value" id="userCount">0</div>
        <div class="stat-sub">Registered accounts</div>
      </div>
      <div class="stat-card">
        <h4>Saves</h4>
        <div class="stat-value" id="saveCount">0</div>
        <div class="stat-sub">Game saves stored</div>
      </div>
      <div class="stat-card">
        <h4>Storage</h4>
        <div class="stat-value" id="storageSize">0 MB</div>
        <div class="stat-sub">Total data stored</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Configuration</span>
      </div>
      <div class="config-body">
        <div class="config-field">
          <label>Host</label>
          <input type="text" id="hostInput" value="0.0.0.0" placeholder="0.0.0.0">
        </div>
        <div class="config-field">
          <label>Port</label>
          <input type="number" id="portInput" value="3456" placeholder="3456" class="port">
        </div>
        <div class="config-actions">
          <button class="btn btn-ghost" id="saveConfigBtn">Save</button>
        </div>
      </div>
    </div>

    <div class="section" style="flex:1; display:flex; flex-direction:column; min-height:0;">
      <div class="section-header">
        <span class="section-title">Registered Users</span>
      </div>
      <div style="flex:1; overflow-y:auto;">
        <table class="users-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Saves</th>
              <th>Storage</th>
              <th>Created</th>
              <th>Last Login</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="7" class="empty-msg">No users registered yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-brand">POWERED BY EXAMPLE CAFE</span>
    <span id="footerVersion">Save & Load Server</span>
  </div>

  <script>
    let expandedUsers = {}

    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '0 MB'
      const mb = bytes / (1024 * 1024)
      if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB'
      if (mb >= 1) return mb.toFixed(1) + ' MB'
      return (bytes / 1024).toFixed(0) + ' KB'
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-'
      const d = new Date(dateStr + 'Z')
      return d.toLocaleString()
    }

    async function loadConfig() {
      const config = await window.serverAPI.getConfig()
      document.getElementById('hostInput').value = config.host || '0.0.0.0'
      document.getElementById('portInput').value = config.port || 3456
    }

    async function updateStatus() {
      const status = await window.serverAPI.getServerStatus()
      const dot = document.getElementById('statusDot')
      const label = document.getElementById('statusLabel')
      const addr = document.getElementById('statusAddress')

      if (status.running) {
        dot.classList.add('online')
        label.className = 'status-label online'
        label.textContent = 'ONLINE'
        addr.style.display = 'block'
        addr.textContent = (status.config.host === '0.0.0.0' ? 'All interfaces' : status.config.host) + ':' + status.config.port
      } else {
        dot.classList.remove('online')
        label.className = 'status-label offline'
        label.textContent = 'OFFLINE'
        addr.style.display = 'none'
      }
    }

    async function toggleUserSaves(userId, row) {
      if (expandedUsers[userId]) {
        const savesRow = document.getElementById('saves-row-' + userId)
        if (savesRow) savesRow.remove()
        delete expandedUsers[userId]
        return
      }

      expandedUsers[userId] = true
      const result = await window.serverAPI.getUserSaves(userId)

      const savesRow = document.createElement('tr')
      savesRow.id = 'saves-row-' + userId
      savesRow.className = 'saves-row'

      if (result.success && result.saves.length > 0) {
        savesRow.innerHTML = '<td colspan="7"><div class="saves-list">' +
          result.saves.map(s =>
            '<div class="save-item">' +
              '<span class="game-name">' + s.game_name + '</span>' +
              '<span class="save-meta">' + formatBytes(s.archive_size) + ' &bull; ' + formatDate(s.updated_at) + '</span>' +
              '<button class="btn btn-red btn-sm" onclick="deleteSave(' + s.id + ', ' + userId + ')">Del</button>' +
            '</div>'
          ).join('') +
        '</div></td>'
      } else {
        savesRow.innerHTML = '<td colspan="7" style="padding-left:36px;color:rgba(255,255,255,0.25);font-size:12px;">No saves</td>'
      }

      row.parentNode.insertBefore(savesRow, row.nextSibling)
    }

    async function deleteUser(userId, username) {
      if (!confirm('Delete user "' + username + '" and ALL their saves? This cannot be undone.')) return
      const result = await window.serverAPI.deleteUser(userId)
      if (result.success) {
        delete expandedUsers[userId]
        updateStats()
      } else {
        alert('Failed: ' + result.error)
      }
    }

    async function deleteSave(saveId, userId) {
      if (!confirm('Delete this save? This cannot be undone.')) return
      const result = await window.serverAPI.deleteSave(saveId)
      if (result.success) {
        delete expandedUsers[userId]
        updateStats()
      } else {
        alert('Failed: ' + result.error)
      }
    }

    async function updateStats() {
      const result = await window.serverAPI.getAdminStats()
      if (result.success) {
        document.getElementById('userCount').textContent = result.stats.users
        document.getElementById('saveCount').textContent = result.stats.saves
        document.getElementById('storageSize').textContent = formatBytes(result.stats.totalSize)

        const tbody = document.getElementById('usersBody')
        if (result.users && result.users.length > 0) {
          tbody.innerHTML = result.users.map(u =>
            '<tr id="user-row-' + u.id + '">' +
              '<td>' + u.id + '</td>' +
              '<td><span class="username-link" onclick="toggleUserSaves(' + u.id + ', this.closest(\'tr\'))">' + u.username + '</span></td>' +
              '<td><span class="badge">' + u.saveCount + '</span></td>' +
              '<td>' + formatBytes(u.totalSize) + '</td>' +
              '<td>' + formatDate(u.created_at) + '</td>' +
              '<td>' + formatDate(u.last_login_at) + '</td>' +
              '<td><div class="td-actions">' +
                '<button class="btn btn-ghost btn-sm" onclick="toggleUserSaves(' + u.id + ', document.getElementById(\'user-row-' + u.id + '\'))">Saves</button>' +
                '<button class="btn btn-red btn-sm" onclick="deleteUser(' + u.id + ', \'' + u.username + '\')">Delete</button>' +
              '</div></td>' +
            '</tr>'
          ).join('')
        } else {
          tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">No users registered yet</td></tr>'
        }
      }
    }

    document.getElementById('saveConfigBtn').addEventListener('click', async () => {
      const host = document.getElementById('hostInput').value
      const port = parseInt(document.getElementById('portInput').value)
      await window.serverAPI.saveConfig({ host, port })
      alert('Configuration saved. Restart the server to apply changes.')
    })

    document.getElementById('startBtn').addEventListener('click', async () => {
      const result = await window.serverAPI.startServer()
      if (result.success) {
        updateStatus()
        setTimeout(updateStats, 500)
      } else {
        alert('Failed to start: ' + result.error)
      }
    })

    document.getElementById('stopBtn').addEventListener('click', async () => {
      const result = await window.serverAPI.stopServer()
      if (result.success) {
        updateStatus()
      }
    })

    loadConfig()
    updateStatus()
    setTimeout(updateStats, 1000)
    setInterval(() => { updateStatus(); updateStats(); }, 5000)

    if (window.serverAPI && window.serverAPI.ota) {
      window.serverAPI.ota.getStatus()
        .then(s => {
          if (s && s.currentVersion) {
            const el = document.getElementById('titlebarVersion')
            if (el) el.textContent = 'v' + s.currentVersion
            const fv = document.getElementById('footerVersion')
            if (fv) fv.textContent = 'Save & Load Server  \u2022  v' + s.currentVersion
          }
        })
        .catch(() => {})
    }
  </script>
</body>
</html>
